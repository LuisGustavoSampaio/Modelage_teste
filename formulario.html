<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f172a">
  <title>Formulário</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-shell">
    <div class="glow glow-left"></div>
    <div class="glow glow-right"></div>

    <main class="container">
      <section class="hero hero-form">
        <span class="eyebrow">Editor de registro</span>
        <h1 id="tituloFormulario">Formulário</h1>
        <p class="descricao hero-copy" id="descricaoFormulario">
          Preencha este formulário como um documento ou relatório.
        </p>
      </section>

      <section class="card card-editor">
        <div class="status-bar status-bar-editor">
          <span class="status-badge" id="statusBadgeFormulario">Rascunho</span>
          <p class="status-salvamento" id="statusSalvamento"></p>
        </div>
        <form id="formDinamico"></form>
        <div class="acoes-editor">
          <button type="button" onclick="enviarFormulario()">Salvar conteúdo</button>
          <button type="button" class="botao-secundario" onclick="voltar()">Voltar</button>
        </div>
      </section>
    </main>
  </div>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
