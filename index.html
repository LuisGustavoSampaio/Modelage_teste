<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login / Cadastro</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <h1>Sistema</h1>

    <!-- Cadastro -->
    <div class="card">
      <h2>Cadastrar</h2>
      <form id="formCadastro">
        <input type="text" id="nomeCadastro" placeholder="Nome" required>
        <input type="email" id="emailCadastro" placeholder="Email" required>
        <button type="submit">Cadastrar</button>
      </form>
    </div>

    <!-- Login -->
    <div class="card">
      <h2>Entrar</h2>
      <form id="formLogin">
        <input type="text" id="nomeLogin" placeholder="Nome" required>
        <input type="email" id="emailLogin" placeholder="Email" required>
        <button type="submit">Entrar</button>
      </form>
    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
