<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f172a">
  <title>Login / Cadastro</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Sistema</h1>

    <div class="card card-destaque">
      <h2>Instalar no celular</h2>
      <p class="descricao">
        Abra este sistema uma vez com internet e depois adicione à tela inicial para usar como app.
      </p>
      <button id="botaoInstalar" class="botao-secundario oculto" type="button">Instalar app</button>
      <div class="guia-instalacao">
        <p><strong>Android:</strong> menu do navegador &gt; <strong>Adicionar à tela inicial</strong> ou <strong>Instalar app</strong>.</p>
        <p><strong>iPhone:</strong> Safari &gt; <strong>Compartilhar</strong> &gt; <strong>Adicionar à Tela de Início</strong>.</p>
      </div>
    </div>

    <div class="card">
      <h2>Cadastrar</h2>
      <form id="formCadastro">
        <input type="text" id="nomeCadastro" placeholder="Nome" required>
        <input type="email" id="emailCadastro" placeholder="Email" required>
        <button type="submit">Cadastrar</button>
      </form>
    </div>

    <div class="card">
      <h2>Entrar</h2>
      <form id="formLogin">
        <input type="text" id="nomeLogin" placeholder="Nome" required>
        <input type="email" id="emailLogin" placeholder="Email" required>
        <button type="submit">Entrar</button>
      </form>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
