<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f172a">
  <title>Offline</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="card card-destaque">
      <h1>Modo offline</h1>
      <p class="descricao">
        Este dispositivo está sem acesso ao servidor no momento, mas o app já foi carregado e pode continuar funcionando com os dados locais.
      </p>
      <p class="descricao">
        Quando a conexão voltar, abra o app novamente e use <strong>Sincronizar agora</strong> para enviar as alterações pendentes.
      </p>
      <button type="button" onclick="window.location.href='index.html'">Tentar abrir o app</button>
    </div>
  </div>
</body>
</html>
